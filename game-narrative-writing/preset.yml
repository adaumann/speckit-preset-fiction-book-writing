schema_version: "1.0"
preset:
  id: "game-narrative-writing"
  name: "Game Narrative Writing"
  version: "1.0.0"
  description: "Spec-Driven Development for interactive game narrative. Adapts storytelling craft to branching structures, player agency, quest design, NPC characterization, world-building lore, and dialogue trees. Supports linear, branching, and emergent narrative modes across single- and multi-protagonist games."
  author: "Andreas Daumann"
  repository: "https://github.com/adaumann/speckit-preset-game-narrative-writing"
  license: "MIT"
requires:
  speckit_version: ">=0.5.0"
provides:
  templates:
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      description: "Game narrative bible: tone and genre, player character voice contract, world lore rules, narrative mode (linear/branching/emergent), theme, and prose principles for cutscenes, dialogue, and environmental storytelling."
      replaces: "constitution-template"
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Game story brief: logline, premise, player arc, NPC arcs, key relationship arcs, branch structure overview, endings map, key scenes/nodes, design requirements, act boundaries, player experience goals, world rules, and open questions."
      replaces: "spec-template"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Plan template (flowmap): node graph in text form, act structure, game bible check gates, information asymmetry map, pacing overview, and node outline scaffold."
      replaces: "plan-template"
    - type: "template"
      name: "implement-template"
      file: "templates/implement-template.md"
      description: "Node draft file: prose body, mechanic hook blocks (MECHANIC:TYPE), choices with branch targets, variables read/set, and status gate (DRAFT/APPROVED/SKIP)."
      replaces: "implement-template"
    - type: "template"
      name: "node-outline-template"
      file: "templates/node-outline-template.md"
      description: "Node outline: beat summary, choice list with branch targets, mechanic hooks triggered, variables read/set. Status gate (DRAFT/APPROVED/SKIP) controls whether speckit.implement drafts this node."
      replaces: "scene-outline-template"
    - type: "template"
      name: "variables-template"
      file: "templates/variables-template.md"
      description: "State variable registry: all declared variables with type, scope, default value, persistence rule, and export name per target. Includes pov variable when player_perspective is switching."
    - type: "template"
      name: "mechanics-template"
      file: "templates/mechanics-template.md"
      description: "Mechanic hook schemas: Tier 1 (flag, counter, visited, inventory, timer, trust, currency, npc_state, ending_condition, choice_memory, clue) with Sugarcube and Ink translations. Tier 2 stubs. Compatibility warning rules."
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Node authoring task list: ordered by act and branch, with research phase, node outline phase, drafting phase, quality gate phase, and export phase."
      replaces: "tasks-template"
    - type: "template"
      name: "characters-template"
      file: "templates/characters-template.md"
      description: "NPC profile: trust state thresholds, dialogue register per state, branch behavior map, bark lines, knowledge state, and first/last appearance nodes."
    - type: "template"
      name: "world-building-template"
      file: "templates/world-building-template.md"
      description: "World-building reference: locations with object inventory and state log, world rules (WR-NNN), ambient states, and faction overview."
    - type: "template"
      name: "endings-template"
      file: "templates/endings-template.md"
      description: "Endings registry: ending ID, name, required variable conditions, node paths that reach it, and carry-over state snapshot for series use."
    - type: "template"
      name: "series-bible-template"
      file: "templates/series-bible-template.md"
      description: "Series bible: carry-over variable registry, canonical import state (default save), ending canon table, world state delta per entry, NPC survival registry, and series arc overview."
    - type: "template"
      name: "glossary-template"
      file: "templates/glossary-template.md"
      description: "Game world glossary: invented terms, proper nouns, variable name register, capitalization rules, and consistency log."
    - type: "template"
      name: "feedback-template"
      file: "templates/feedback-template.md"
      description: "Playtest feedback log: issue type (Branch/Variable/Pacing/Clarity/Balance), node ID, severity, and generated revision tasks."
    - type: "template"
      name: "research-template"
      file: "templates/research-template.md"
      description: "Research log: factual and world-building knowledge gaps mapped to nodes, authenticity flags, resolved findings, and open items for task generation."
    - type: "template"
      name: "themes-template"
      file: "templates/themes-template.md"
      description: "Thematic contract: central theme and dramatic question, motif registry (per-node planned occurrences), symbol and object registry, ending thematic divergence, and thematic drift log."
    - type: "template"
      name: "puzzles-template"
      file: "templates/puzzles-template.md"
      description: "P&C Puzzle registry: logical and physical dependency tracking, inventory combinations, and verb-mode interaction mapping (Examine/Interact)."
    - type: "template"
      name: "escoria-script-template"
      file: "templates/escoria-script-template.md"
      description: "Escoria Room Script template: Godot-optimized .esc script structure with support for setup blocks, verb-specific interactions, and marker-based navigation."
    - type: "template"
      name: "relationships-template"
      file: "templates/relationships-template.md"
      description: "NPC relationship arcs: REL-NNN tracked dynamics between key NPCs, repeating loop, five key beats with node references, variable impact table, and drift log."
    - type: "template"
      name: "timeline-template"
      file: "templates/timeline-template.md"
      description: "In-world chronology: fabula (event order), syuzhet (player discovery order across branches), branching timeline consequences, continuity constraints, and timer event schedule. Optional — use for mystery, historical, or timer-heavy games."
    - type: "template"
      name: "checklist-template"
      file: "templates/checklist-template.md"
      description: "Node quality checklist: choice meaningfulness test, hook declaration check, dead-end check, variable read-before-set check, POV drift check, and constitution compliance."
      replaces: "checklist-template"
    - type: "template"
      name: "agent-file-template"
      file: "templates/agent-file-template.md"
      description: "Living context file: active node ID, open branch targets, current variable state snapshot, recent NPC state changes, and open threads."
      replaces: "agent-file-template"
    - type: "template"
      name: "sugarcube-theme-dark"
      file: "templates/sugarcube-theme-dark.css"
      description: "Sugarcube 2.x dark CSS theme: deep charcoal background, muted purple accent, serif prose column, sidebar UI. All values exposed as CSS custom properties in :root for easy adjustment."
    - type: "template"
      name: "sugarcube-theme-light"
      file: "templates/sugarcube-theme-light.css"
      description: "Sugarcube 2.x light CSS theme: warm off-white background, ink-blue links, golden accent, serif prose column with sidebar. All values exposed as CSS custom properties in :root."
    - type: "template"
      name: "sugarcube-theme-minimal"
      file: "templates/sugarcube-theme-minimal.css"
      description: "Sugarcube 2.x minimal CSS theme: white page, hidden sidebar, centred prose column, near-invisible UI. Ideal for literary IF where the interface should disappear. CSS custom properties in :root."
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Create a narrative design document from a game idea: premise, player arc, central dramatic question, branch structure overview, endings count."
    - type: "command"
      name: "speckit.clarify"
      file: "commands/speckit.clarify.md"
      description: "Detect and resolve narrative ambiguity: branching logic gaps, undeclared variables, unreachable endings, NPC state contradictions."
    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Generate the constitution (constitution.md) from an approved narrative design doc. Configures engine target, mechanics, POV, craft rules, and content policy."
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Generate the project plan (flowmap.md) from an approved story brief: node graph, act structure, branch health check, information asymmetry map. Also generates all supporting documents — variables.md, mechanics.md, endings.md, character profiles, world-building.md, glossary.md, themes.md, and conditional documents (relationships.md, timeline.md, series-bible.md)."
    - type: "command"
      name: "speckit.outline"
      file: "commands/speckit.outline.md"
      description: "Generate editable node outline files: beat summary, choice list with branch targets, mechanic hooks, variables read/set. Status gate controls drafting in speckit.implement."
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Generate node authoring tasks ordered by act and branch: research phase, outline phase, drafting phase, quality gate phase, export phase."
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Draft node prose from approved node outlines, inserting mechanic hook blocks. Gates on APPROVED outline status. Enforces hook declaration against variables-template."
    - type: "command"
      name: "speckit.analyze"
      file: "commands/speckit.analyze.md"
      description: "Pre-draft structural check: branch coverage, dead ends, unreachable nodes, undeclared variables, endings reachability. Run before speckit.implement."
    - type: "command"
      name: "speckit.status"
      file: "commands/speckit.status.md"
      description: "Project dashboard: node count by status, branch coverage %, variable completeness, endings reachable vs. declared, outstanding quality gates."
    - type: "command"
      name: "speckit.checklist"
      file: "commands/speckit.checklist.md"
      description: "Node quality gates: choice meaningfulness test, hook declaration check, dead-end check, variable read-before-set check, POV drift check."
    - type: "command"
      name: "speckit.revise"
      file: "commands/speckit.revise.md"
      description: "Targeted node revision: rewrites only failing passages or broken hook blocks identified by speckit.checklist or speckit.continuity. Produces a versioned node file."
    - type: "command"
      name: "speckit.continuity"
      file: "commands/speckit.continuity.md"
      description: "Post-draft audit: variable state consistency across all branches, branch reachability, POV drift, series bible carry-over variable validation."
    - type: "command"
      name: "speckit.flowmap"
      file: "commands/speckit.flowmap.md"
      description: "Visualize the full branch graph as a Mermaid flowchart with mechanic trigger annotations, ending markers, and act boundary labels."
    - type: "command"
      name: "speckit.mechanics"
      file: "commands/speckit.mechanics.md"
      description: "Manage mechanic hook schemas: declare new Tier 2 stubs, promote stubs to Tier 1 with translation tables, audit hook usage across node files vs. mechanics.md declarations."
    - type: "command"
      name: "speckit.export"
      file: "commands/speckit.export.md"
      description: "Export all drafted nodes to Twine/Sugarcube (.twee Twee 3) or Ink (.ink). Translates Tier 1 mechanic hooks to engine syntax. Emits compatibility warnings for Tier 2 hooks."
    - type: "command"
      name: "speckit.brainstorm"
      file: "commands/speckit.brainstorm.md"
      description: "Interactive brainstorming session for any game narrative topic: story, characters, mechanics, endings, world, variables, series, or glossary."
    - type: "command"
      name: "speckit.research"
      file: "commands/speckit.research.md"
      description: "Research tracking: log knowledge gaps (add), record findings (resolve), scan drafted nodes for unsupported claims (check), view open items ranked by risk (status)."
    - type: "command"
      name: "speckit.feedback"
      file: "commands/speckit.feedback.md"
      description: "Ingest playtest notes, categorize by issue type (Branch/Variable/Pacing/Clarity/Balance), map to node IDs, assign severity, generate prioritized revision tasks."
    - type: "command"
      name: "speckit.series"
      file: "commands/speckit.series.md"
      description: "Manage series bible: validate carry-over variables are declared before use, check ending canon consistency across entries, generate import questionnaire scaffold."
    - type: "command"
      name: "speckit.help"
      file: "commands/speckit.help.md"
      description: "Command reference: all commands with sub-commands, workflow stage, and recommended next step."
    - type: "command"
      name: "speckit.theme"
      file: "commands/speckit.theme.md"
      description: "Generate or adjust story.css: copies a base Sugarcube CSS theme (dark/light/minimal) and applies colour, font, background, and layout overrides. Supports both flag-based and natural language input."
    - type: "script"
      name: "export"
      file: "scripts/python/export.py"
      description: "Export script: Twee 3/Sugarcube emitter, Ink emitter, Tier 1 hook translation layer, compatibility warnings for unsupported hooks."
      language: "python"
      requires: []
tags: ["writing", "game", "narrative", "interactive-fiction", "quest-design", "dialogue", "game-dev"]
