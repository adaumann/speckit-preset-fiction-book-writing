schema_version: "1.0"
preset:
  id: "fiction-book-writing"
  name: "Fiction Book Writing"
  version: "1.3.0"
  description: "Spec-Driven Development for novel and book writing. Replaces software engineering terminology with storytelling craft: features become story elements, specs become story briefs, plans become story structures, and tasks become scene-by-scene writing tasks. Supports multiple plot structure frameworks, multi-POV architecture (alternating, dual, braided, ensemble, mosaic, frame, chorus, first-person-multiple), and two style modes: author voice sample or humanized AI prose principles."
  author: "Spec Kit Community"
  repository: "https://github.com/andreasdarsa/spec-kit"
  license: "MIT"
requires:
  speckit_version: ">=0.1.0"
provides:
  templates:
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Story brief with logline, character arcs, scene beats (Given/When/Then), plot requirements, and reader experience goals."
      replaces: "spec-template"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Story structure template with story bible check gates, act/phase breakdown by plot structure, and supporting document map."
      replaces: "plan-template"
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Scene-by-scene writing tasks organized by act and character arc, with research phase, critical checkpoint, and polish pass."
      replaces: "tasks-template"
    - type: "template"
      name: "checklist-template"
      file: "templates/checklist-template.md"
      description: "Scene quality checklist: triple purpose test, off-balance ending, character physical presence, dialogue subtext."
      replaces: "checklist-template"
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      description: "Story bible with two style modes: author voice sample or humanized AI prose principles (sensory detail, character depth, dialogue craft, scene integrity)."
      replaces: "constitution-template"
    - type: "template"
      name: "characters-template"
      file: "templates/characters-template.md"
      description: "Full character profile: psychological core, speech patterns, vocabulary register, sample dialogue, internal monologue voice examples, body language, emotional landscape, relationship dynamics, scene guidance, verbal tics, and writer summary."
    - type: "template"
      name: "agent-file-template"
      file: "templates/agent-file-template.md"
      description: "Living story context document: active characters, world state, open narrative threads, recent chapters."
      replaces: "agent-file-template"
    - type: "template"
      name: "series-bible-template"
      file: "templates/series-bible-template.md"
      description: "Series-level canon document: world rules, character state registry per book, series arc, continuity constraints, and known contradiction log."
    - type: "template"
      name: "synopsis-template"
      file: "templates/synopsis-template.md"
      description: "Query-ready synopsis: one-page (250–350 words) and full (1,000–2,000 words) formats in present tense, arc resolution summary, and query notes. Post-draft output document."
    - type: "template"
      name: "glossary-template"
      file: "templates/glossary-template.md"
      description: "Consistency reference: invented terms with usage constraints, proper nouns with all variant forms, capitalization and spelling rules, and a consistency log populated by speckit.polish and speckit.continuity."
    - type: "template"
      name: "subplots-template"
      file: "templates/subplots-template.md"
      description: "Subplot beat sheets for every P2+ arc: inciting incident through resolution, main plot intersection map, convergence map for multi-arc chapters, and resolution checklist."
    - type: "template"
      name: "research-template"
      file: "templates/research-template.md"
      description: "Research document for a story: open questions, source notes, world-building facts, and resolved findings that drive task generation."
    - type: "template"
      name: "timeline-template"
      file: "templates/timeline-template.md"
      description: "Story timeline: chapter-by-chapter chronology, elapsed time, scene durations, and continuity cross-references."
    - type: "template"
      name: "world-building-template"
      file: "templates/world-building-template.md"
      description: "World-building reference: setting rules, geography, culture, history, and in-world systems used during drafting."
    - type: "template"
      name: "locations-template"
      file: "templates/locations-template.md"
      description: "Canonical location reference: per-location sensory anchors, atmosphere by time of day, character behavioral tells, scene guidance, prohibited uses, and state log for continuity tracking."
    - type: "template"
      name: "themes-template"
      file: "templates/themes-template.md"
      description: "Thematic contract: motif registry with planned occurrences and transformation arc, symbol tracker, chapter-by-chapter thematic work map, and drift log populated by speckit.continuity."
    - type: "template"
      name: "characters-index-template"
      file: "templates/characters-index-template.md"
      description: "Character index: master roster of all characters with role, affiliations, first appearance, and link to full character profile."
    - type: "template"
      name: "query-letter-template"
      file: "templates/query-letter-template.md"
      description: "Query letter: hook, story body, housekeeping, comp titles, author bio, submission tracker, and personalization notes. Generated and updated by speckit.query."
    - type: "template"
      name: "feedback-template"
      file: "templates/feedback-template.md"
      description: "Beta/editorial feedback log: raw notes, categorized issues (Structural/Character/Pacing/Clarity/Factual) with severity, revision tasks generated, and resolution log."
    - type: "template"
      name: "pov-structure-template"
      file: "templates/pov-structure-template.md"
      description: "Multi-POV architecture document: POV mode selection (alternating, dual, braided, ensemble, mosaic, frame, chorus, first-person-multiple), voice differentiation matrix, POV schedule, information asymmetry map, convergence points, relay rules, and arc weighting. Combines with any plot structure."
    - type: "template"
      name: "scene-outline-template"
      file: "templates/scene-outline-template.md"
      description: "Per-scene outline file: opening hook, causal beat sequence, character beats (want vs. get), dialogue requirements (what must be deflected), sensory anchors, thematic work, and story bible compliance notes. Status field (DRAFT/APPROVED/SKIP) gates AI prose generation in speckit.implement."
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Create a story brief from a natural language idea: logline, character arcs, scene beats, plot requirements."
    - type: "command"
      name: "speckit.status"
      file: "commands/speckit.status.md"
      description: "Project dashboard: chapter progress table (status × word count × polished version), task completion, checklist gates, workflow stage, and word count projection."
    - type: "command"
      name: "speckit.clarify"
      file: "commands/speckit.clarify.md"
      description: "Detect and resolve narrative ambiguity in the active story brief: character motivation, timeline, POV, world-building gaps."
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Create the story structure from the brief and story bible: act/phase breakdown, chapter map, supporting documents."
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Generate scene-by-scene writing tasks ordered by act and character arc."
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Draft scenes and chapters by executing writing tasks from tasks.md."
    - type: "command"
      name: "speckit.analyze"
      file: "commands/speckit.analyze.md"
      description: "Pre-draft structural alignment check: spec\u2194plan coverage, act proportions, task completeness. Run before speckit.implement."
    - type: "command"
      name: "speckit.continuity"
      file: "commands/speckit.continuity.md"
      description: "Post-draft prose analysis: story bible compliance, character arc consistency, timeline coherence, open thread coverage. Run after speckit.implement."
    - type: "command"
      name: "speckit.revise"
      file: "commands/speckit.revise.md"
      description: "Targeted chapter revision: rewrites only failing passages identified by speckit.checklist or speckit.continuity. Produces a versioned draft file with a diff summary."
    - type: "command"
      name: "speckit.checklist"
      file: "commands/speckit.checklist.md"
      description: "Generate scene quality checklists: triple purpose test, dialogue subtext, off-balance ending, story bible compliance."
    - type: "command"
      name: "speckit.polish"
      file: "commands/speckit.polish.md"
      description: "Final line-edit pass: prose rhythm, sentence variety, filter words, adverb density, weak verbs, voice register drift, and dialogue attribution. Runs after speckit.checklist PASS."
    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Create or update the story bible: style mode selection, plot structure, central dramatic question, craft principles."
    - type: "command"
      name: "speckit.export"
      file: "commands/speckit.export.md"
      description: "Export all drafted chapters to DOCX (Word, submission-ready), EPUB (KDP/Draft2Digital/IngramSpark), or LaTeX (typeset) via pandoc. Assembles chapters in order, preferring polished versions."
    - type: "command"
      name: "speckit.query"
      file: "commands/speckit.query.md"
      description: "Generate a query letter from spec.md and synopsis.md: hook, story body, comp titles, author bio, housekeeping. Enforces 250–350 word limit. Updates submission tracker."
    - type: "command"
      name: "speckit.feedback"
      file: "commands/speckit.feedback.md"
      description: "Ingest beta reader or editor notes, categorize by issue type (Structural/Character/Pacing/Clarity/Factual), map to chapter IDs, assign severity, and generate prioritized revision tasks."
    - type: "command"
      name: "speckit.pov"
      file: "commands/speckit.pov.md"
      description: "Multi-POV architecture command: draft pov-structure.md, audit voice differentiation, generate/validate the POV chapter schedule, check information asymmetry (no POV character knows what they shouldn't), and audit relay transitions between POV chapters."
    - type: "command"
      name: "speckit.outline"
      file: "commands/speckit.outline.md"
      description: "Generate editable scene outline files (outlines/) from plan.md before drafting. Authors review beat sequence, dialogue requirements, sensory anchors, and thematic work, then set status: APPROVED to allow AI drafting or status: SKIP to write the chapter themselves. Gates speckit.implement when outline files are present."
    - type: "script"
      name: "export"
      file: "scripts/python/export.py"
      description: "Python script invoked by speckit.export. Collects draft chapters, sorts by chapter_id, and shells out to pandoc for DOCX, EPUB, or LaTeX output. Requires pandoc >= 2.11."
tags: ["writing", "novel", "fiction", "storytelling", "creative-writing", "kdp"]
